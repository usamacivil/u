<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; color: #333; }
        .container { max-width: 400px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #004d99; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #003366; }
    </style>
</head>
<body>

<div class="container">
    <h3>Student Report Tool</h3>
    <p>Please enter your name to generate your completion report.</p>
    
    <label for="studentName">Full Name:</label>
    <input type="text" id="studentName" placeholder="Enter your name here">
    
    <button onclick="generatePDF()">Download Report (PDF)</button>
</div>

<script>
    async function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const name = document.getElementById('studentName').value;

        if (!name) {
            alert("Please enter a name first.");
            return;
        }

        // PDF Content
        doc.setFontSize(22);
        doc.text("Activity Completion Report", 20, 20);
        
        doc.setFontSize(12);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 35);
        doc.text(`Student Name: ${name}`, 20, 45);
        
        doc.line(20, 50, 190, 50); // Horizontal line
        
        doc.text("This document confirms the submission of data via the", 20, 60);
        doc.text("International Office portal.", 20, 67);

        // Save the PDF
        doc.save(`${name.replace(/\s+/g, '_')}_Report.pdf`);
    }
</script>

</body>
</html>
